name: WeatherApp
options:
  bundleIdPrefix: com.weather
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  WeatherApp:
    type: application
    platform: iOS
    sources:
      - WeatherApp
    info:
      path: WeatherApp/Resources/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      INFOPLIST_FILE: WeatherApp/Resources/Info.plist
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Приложению нужен доступ к геолокации для определения погоды в вашем местоположении"
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_VERSION: "5.0"
      CODE_SIGN_STYLE: Automatic
      PRODUCT_BUNDLE_IDENTIFIER: com.weather.WeatherApp
